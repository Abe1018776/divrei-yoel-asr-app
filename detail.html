<!DOCTYPE html>
<html lang="yi" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>דברי יואל — Detail</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="app-header">
    <a href="/" class="app-title" style="text-decoration:none;">דברי יואל — ASR Workbench</a>
    <div class="toolbar">
      <button id="btn-back" class="toolbar-btn">Back to Table</button>
      <button id="btn-logout" class="toolbar-btn" title="Sign out">Sign Out</button>
    </div>
  </header>

  <main class="detail-page" id="detail-page">
    <!-- Rendered by src/detail.js -->
  </main>

  <!-- Video Export Section (unique to Divrei Yoel) -->
  <div id="video-export-overlay" style="display:none;">
    <div class="video-export-panel">
      <h3 class="video-export-title">Video Export</h3>
      <div class="video-export-controls">
        <label class="video-export-label">
          Snippet Start (s)
          <input type="number" id="snippet-start" step="0.1" min="0" value="0" class="video-export-input" />
        </label>
        <label class="video-export-label">
          Snippet End (s)
          <input type="number" id="snippet-end" step="0.1" min="0" value="0" class="video-export-input" />
        </label>
        <label class="video-export-label">
          Background Template
          <select id="bg-template" class="video-export-select">
            <option value="gradient-blue">Blue Gradient</option>
            <option value="gradient-gold">Gold Gradient</option>
            <option value="dark-elegant">Dark Elegant</option>
            <option value="parchment">Parchment</option>
          </select>
        </label>
        <button id="btn-export-video" class="video-export-btn">Export MP4 Video</button>
        <div id="export-progress" style="display:none;">
          <div class="video-export-progress-bar">
            <div class="video-export-progress-fill" id="export-progress-fill"></div>
          </div>
          <span id="export-progress-text" class="video-export-progress-text">Generating...</span>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/detail.js"></script>
</body>
</html>
