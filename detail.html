<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>דברי יואל - Detail View</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="detail-page">
  <header>
    <a href="/" class="back-link">&larr; Back to Table</a>
    <h1 id="file-title">Loading...</h1>
  </header>

  <main class="detail-layout">
    <section class="detail-left">
      <h2>Audio</h2>
      <audio id="audio-player" controls preload="none"></audio>
      <div id="audio-info">
        <span id="duration-display"></span>
      </div>
      <div id="trim-controls">
        <label>Trim Start: <input type="number" id="trim-start" step="0.1" min="0" value="0"> s</label>
        <label>Trim End: <input type="number" id="trim-end" step="0.1" min="0" value="0"> s</label>
      </div>
      <div id="video-export-section">
        <h3>Video Export</h3>
        <label>Snippet Start: <input type="number" id="snippet-start" step="0.1" min="0" value="0"> s</label>
        <label>Snippet End: <input type="number" id="snippet-end" step="0.1" min="0" value="0"> s</label>
        <select id="bg-template">
          <option value="gradient-blue">Blue Gradient</option>
          <option value="gradient-gold">Gold Gradient</option>
          <option value="dark-elegant">Dark Elegant</option>
          <option value="parchment">Parchment</option>
        </select>
        <button id="btn-export-video">Export MP4 Video</button>
        <div id="export-progress" style="display:none">
          <div class="progress-bar"><div class="progress-fill" id="export-progress-fill"></div></div>
          <span id="export-progress-text">Generating...</span>
        </div>
      </div>
    </section>

    <section class="detail-center">
      <div id="transcript-header">
        <h2>Transcript</h2>
        <select id="version-select">
          <option value="manual">Manual</option>
          <option value="cleaned">Cleaned</option>
          <option value="edited">Edited</option>
        </select>
      </div>
      <div id="diff-view">
        <div id="original-text" class="text-panel">
          <h3>Original</h3>
          <div class="text-content" id="original-content"></div>
        </div>
        <div id="cleaned-text" class="text-panel">
          <h3>Cleaned / Aligned</h3>
          <div class="text-content" id="cleaned-content"></div>
        </div>
      </div>
    </section>

    <section class="detail-right">
      <h2>Review</h2>
      <div id="alignment-info">
        <p>Avg Confidence: <span id="avg-confidence">&mdash;</span></p>
        <p>Low Confidence Words: <span id="low-confidence-count">&mdash;</span></p>
      </div>
      <div id="review-actions">
        <button id="btn-approve" class="btn-success">Approve</button>
        <button id="btn-reject" class="btn-danger">Reject</button>
        <button id="btn-skip" class="btn-secondary">Skip</button>
      </div>
      <div id="transcript-meta">
        <p>Date: <span id="meta-date">&mdash;</span></p>
        <p>First Line: <span id="meta-first-line">&mdash;</span></p>
      </div>
    </section>
  </main>

  <script type="module" src="/src/detail.js"></script>
</body>
</html>
